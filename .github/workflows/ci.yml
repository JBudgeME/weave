name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: lint · format · build · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # LFS objects (weights.bin) are cached so CI doesn't burn LFS bandwidth
      # quota on every run — only a changed weight blob re-downloads.
      - name: List LFS assets for cache key
        run: git lfs install --local && git lfs ls-files --long | cut -d ' ' -f1 | sort > .lfs-assets-id

      - uses: actions/cache@v4
        with:
          path: .git/lfs
          key: lfs-${{ hashFiles('.lfs-assets-id') }}

      - name: Pull LFS files
        run: git lfs pull

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Format check
        run: bun run format:check

      - name: Lint
        run: bun run lint

      - name: Build
        run: bun run build

      - name: Test
        run: bun test
